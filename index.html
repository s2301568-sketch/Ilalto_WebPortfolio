<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zielino.com</title>
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E84E0F;
      --dark: #1a1008;
      --text: #f0ebe4;
      --muted: rgba(240,235,228,0.65);
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      background: rgba(20,10,4,0.72);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-brand {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    .nav-menu-icon {
      display: flex;
      flex-direction: column;
      gap: 4px;
      cursor: pointer;
      padding: 4px;
    }
    .nav-menu-icon span {
      display: block;
      width: 20px;
      height: 2px;
      background: var(--muted);
      border-radius: 1px;
    }

    /* HERO */
    .hero {
      min-height: 100vh;
      padding-top: 52px;
      position: relative;
      display: flex;
      align-items: stretch;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 60% at 70% 55%, #b84010 0%, transparent 65%),
        radial-gradient(ellipse 40% 45% at 30% 70%, #7a2a05 0%, transparent 60%),
        radial-gradient(ellipse 30% 35% at 55% 20%, #d45a15 0%, transparent 55%),
        var(--dark);
      opacity: 0.92;
    }

    .hero-inner {
      position: relative;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 4rem 3.5rem 3rem;
      gap: 2rem;
    }

    /* LEFT */
    .hero-left {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-self: stretch;
    }

    .asterisk {
      position: absolute;
      top: 0; left: -1rem;
      font-size: 11rem;
      line-height: 1;
      color: var(--orange);
      font-weight: 900;
      font-family: 'Unbounded', sans-serif;
      user-select: none;
      pointer-events: none;
    }

    .hello-text {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(3.5rem, 7vw, 5.5rem);
      font-weight: 900;
      line-height: 0.9;
      color: var(--text);
      position: relative;
      z-index: 1;
      margin-top: auto;
      padding-top: 7rem;
    }

    /* photo slot */
    .photo-slot {
      position: absolute;
      bottom: 0;
      right: -2rem;
      width: 220px;
      height: 320px;
      overflow: hidden;
      z-index: 2;
    }

    .photo-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .photo-slot-empty {
      background: rgba(255,255,255,0.04);
      border: 2px dashed rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* RIGHT */
    .hero-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 1.1rem;
      padding-left: 2.5rem;
    }

    .headline {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(2rem, 5vw, 3.8rem);
      font-weight: 900;
      line-height: 1.0;
      color: var(--text);
    }

    .subhead {
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 300;
      color: var(--text);
      line-height: 1.45;
      max-width: 340px;
    }

    .tagline {
      font-size: clamp(0.82rem, 1.3vw, 0.95rem);
      font-weight: 300;
      font-style: italic;
      color: var(--muted);
      line-height: 1.55;
      max-width: 320px;
    }

    .cta-arrow {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.5rem;
      cursor: pointer;
      width: fit-content;
    }

    .cta-line {
      width: 60px;
      height: 1.5px;
      background: var(--text);
    }

    .cta-arrowhead {
      width: 0;
      height: 0;
      border-top: 5px solid transparent;
      border-bottom: 5px solid transparent;
      border-left: 8px solid var(--text);
    }

    .hero-divider {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15) 30%, rgba(255,255,255,0.15) 70%, transparent);
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-left  { animation: fadeUp 0.8s ease both; }
    .headline   { animation: fadeUp 0.8s 0.15s ease both; }
    .subhead    { animation: fadeUp 0.8s 0.28s ease both; }
    .tagline    { animation: fadeUp 0.8s 0.40s ease both; }
    .cta-arrow  { animation: fadeUp 0.8s 0.52s ease both; }

    /* RESPONSIVE */
    @media (max-width: 680px) {
      .hero-inner {
        grid-template-columns: 1fr;
        padding: 2rem 1.5rem;
      }
      .hero-right { padding-left: 0; }
      .photo-slot { position: relative; right: 0; width: 160px; height: 220px; margin-top: 1rem; }
      .asterisk { font-size: 7rem; }
      .hello-text { font-size: 3rem; padding-top: 5rem; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="/" class="nav-brand">✦ zielino.com</a>
    <ul class="nav-links">
      <li><a href="#">Gallery</a></li>
      <li><a href="#">Instagram</a></li>
      <li><a href="#">Contact us</a></li>
      <li>
        <div class="nav-menu-icon" aria-label="Menu">
          <span></span><span></span><span></span>
        </div>
      </li>
    </ul>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-bg"></div>

    <div class="hero-inner">

      <!-- LEFT -->
      <div class="hero-left">
        <div class="asterisk">✳</div>
        <div class="hello-text">hello,</div>

        <!-- Replace comment below with your <img> tag -->
        <div class="photo-slot photo-slot-empty" id="photoSlot">
          <!-- <img src="your-photo.jpg" alt="Dave"> -->
          photo here
        </div>
      </div>

      <!-- RIGHT -->
      <div class="hero-right">
        <h1 class="headline">
          i'm <span class="name">dave!</span>
        </h1>
        <p class="subhead">
          a graphic designer<br>
          based in Philippines—
        </p>
        <p class="tagline">
          creating visuals, concepts, and<br>
          stories that feel alive.
        </p>
        <div class="cta-arrow">
          <div class="cta-line"></div>
          <div class="cta-arrowhead"></div>
        </div>
      </div>

    </div>

    <div class="hero-divider"></div>
  </section>

</body>
</html>
